<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sayfa Bulunamadı - Aspect</title>
    <script>
        // React Router SPA için tüm 404'leri ana sayfaya yönlendir
        // Bu script, build zamanında otomatik olarak çalışacak
        var path = window.location.pathname;
        
        // Statik dosyalar (css, js, vb.) içinse, gerçek 404 dön
        if (/\.(css|js|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$/i.test(path)) {
            // Statik dosya değilse, index.html'e yönlendir
            window.location.href = '/';
        } else {
            // SPA için index.html'e yönlendir
            window.location.href = '/';
        }
    </script>
</head>
<body style="margin: 0; padding: 0; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;">
    <div style="display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center;">
        <div>
            <h1 style="font-size: 72px; margin: 0; color: #00ff00;">404</h1>
            <p style="font-size: 24px; margin: 20px 0; color: #ccc;">Sayfa Bulunamadı</p>
            <p style="color: #999; margin-bottom: 30px;">Aradığınız sayfa mevcut değil. Ana sayfaya yönlendiriliyorsunuz...</p>
            <a href="/" style="
                display: inline-block;
                padding: 12px 30px;
                background: #00ff00;
                color: #000;
                text-decoration: none;
                border-radius: 8px;
                font-weight: bold;
                transition: all 0.3s;
            " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                Ana Sayfaya Dön
            </a>
        </div>
    </div>
</body>
</html>
